title: SVG Phishing Malware Process Chain
id: 4d98123f-e95b-1a4a-318b-28ee13bccf1d
status: experimental
description: Detects the process creation chain for SVG phishing malware (iexplore.exe -> msedge.exe)
date: 2026/03/12
modified: 2026/03/12
references:
    - https://blog.seccops.com/svg-phishing-analysis
    - https://app.any.run/tasks/f14c7592-c4ec-410f-86b8-5155d1047ba8
tags:
    - attack.execution
    - attack.t1204.002
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        - ParentImage|endswith: '\iexplore.exe'
          Image|endswith: '\msedge.exe'
        - Image|endswith: '\iexplore.exe'
          CommandLine|contains: 'Remittance_Advice.svg'
    condition: selection
falsepositives:
    - Unknown
level: high
