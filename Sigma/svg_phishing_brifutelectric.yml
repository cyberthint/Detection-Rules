title: SVG Phishing Malware Network Connection
id: 4d98123f-e95b-1a4a-318b-28ee13bccf3d
status: experimental
description: Detects network connections to malicious infrastructure
date: 2026/03/12
references:
    - https://blog.seccops.com/svg-phishing-analysis
tags:
    - attack.command_and_control
    - attack.t1071.001
logsource:
    category: network_connection
    product: windows
detection:
    selection:
        DestinationHostname|endswith:
            - 'brifutelectric.com'
            - 'poocheasta.biz.pl'
            - 'pocaheasta.biz.pl'
        Initiated: 'true'
    condition: selection
falsepositives:
    - Legitimate connections
level: critical
