title: SVG Phishing Malware PowerShell Decode Attempt
id: 4d98123f-e95b-1a4a-318b-28ee13bccf5d
status: experimental
description: Detects PowerShell decoding attempts
date: 2026/03/12
references:
    - https://blog.seccops.com/svg-phishing-analysis
tags:
    - attack.defense_evasion
    - attack.t1027
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'base64'
            - 'fromCharCode'
            - '6795a9a7242893e6ef978723'
    condition: selection
falsepositives:
    - Legitimate PowerShell scripting
level: low
