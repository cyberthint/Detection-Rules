title: KarstoRat UAC Bypass via fodhelper
id: b8c3d4e5-6f7a-8b9c-0d1e-2f3a4b5c6d7e
status: experimental
description: Detects KarstoRat UAC bypass technique using fodhelper.exe and ms-settings registry modification
author: Cyberthint Threat Intelligence Team
date: 2026-03-03
references:
    - https://cyberthint.io/karstorat-rat-case-study
tags:
    - attack.privilege_escalation
    - attack.t1548.002
logsource:
    product: windows
    category: registry_event
detection:
    selection_reg:
        EventType: SetValue
        TargetObject|contains: 'ms-settings\Shell\Open\command'
        Details|contains: 'DelegateExecute'
    selection_proc:
        Image|endswith: '\fodhelper.exe'
    condition: selection_reg and selection_proc
falsepositives:
    - Legitimate Windows features using fodhelper
    - Rare, but possible during system troubleshooting
level: high